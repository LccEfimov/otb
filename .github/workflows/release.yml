name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci-gate:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI checks are successful for tag commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
            --jq '[.check_runs[] | select(.name == "test" or .name == "lint") | .conclusion] as $checks
                  | ($checks | length == 2) and all($checks[]; . == "success")' \
            | grep -qx true

  build-release:
    needs: ci-gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install flet
      - name: Build windows package and checksums
        run: python scripts/build_windows.py
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            dist/TerraTesting-win.zip
            dist/checksums.txt

  publish:
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release-assets
          path: dist
      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/TerraTesting-win.zip \
            dist/checksums.txt \
            --title "${GITHUB_REF_NAME}" \
            --notes-file docs/release-notes/v1.0.0.md \
            --verify-tag
