name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Тег релиза в формате vX.Y.Z (например, v1.0.0)"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  actions: read
  checks: read
  contents: write

jobs:
  ci-gate:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: read
    steps:
      - name: Verify CI checks are successful for tag commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep fail-fast gating via check-runs API for ${{ github.sha }}.
          # This requires `checks: read` (and `actions: read`) permissions.
          gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
            --jq '[.check_runs[] | select(.name == "test" or .name == "lint") | .conclusion] as $checks
                  | ($checks | length == 2) and all($checks[]; . == "success")' \
            | grep -qx true

  build-release:
    needs: ci-gate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install flet
      - name: Build windows package and checksums
        run: python scripts/build_windows.py
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            dist/TerraTesting-win.zip
            dist/checksums.txt

  # Manual workflow_dispatch must not depend on ci-gate, because ci-gate is skipped
  # outside tag-push events and would otherwise block manual build execution.
  build-release-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Validate manual release tag input
        shell: bash
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          if [[ -z "$TAG" ]]; then
            echo "release_tag input is required for manual run" >&2
            exit 1
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_tag must match vX.Y.Z (got: $TAG)" >&2
            exit 1
          fi

          echo "Validated manual release_tag=$TAG"
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install flet
      - name: Build windows package and checksums
        run: python scripts/build_windows.py
      - name: Upload manual build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets-manual
          path: |
            dist/TerraTesting-win.zip
            dist/checksums.txt

  publish:
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release-assets
          path: dist
      - name: Preflight release notes
        run: |
          VERSION_NOTES_PATH="docs/release-notes/${GITHUB_REF_NAME}.md"

          if [[ -f "${VERSION_NOTES_PATH}" ]]; then
            echo "Using version-specific release notes: ${VERSION_NOTES_PATH}"
            echo "RELEASE_NOTES_FILE=${VERSION_NOTES_PATH}" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ -f "CHANGELOG.md" ]]; then
            echo "Version notes not found at ${VERSION_NOTES_PATH}. Falling back to CHANGELOG.md"
            echo "RELEASE_NOTES_FILE=CHANGELOG.md" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "ERROR: release notes file '${VERSION_NOTES_PATH}' not found and fallback file 'CHANGELOG.md' is missing." >&2
          echo "Please add docs/release-notes/${GITHUB_REF_NAME}.md or restore CHANGELOG.md before running release." >&2
          exit 1
      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/TerraTesting-win.zip \
            dist/checksums.txt \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${RELEASE_NOTES_FILE}" \
            --verify-tag
